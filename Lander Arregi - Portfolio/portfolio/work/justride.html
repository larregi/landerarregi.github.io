<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Justride — Case Study · Lander Arregi</title>
  <meta name="description" content="Unifying ticketing, validation and payment flows for a global mobility platform serving 100+ transit agencies.">

  <script>
    (function () {
      var STORAGE_KEY = 'lp-theme';
      var pref = localStorage.getItem(STORAGE_KEY) || 'light';
      if (pref !== 'dark' && pref !== 'light') pref = 'light';
      document.documentElement.setAttribute('data-theme', pref);
      document.documentElement.setAttribute('data-theme-pref', pref);
      window.__applyTheme = function (p) {
        document.documentElement.setAttribute('data-theme', p === 'dark' ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme-pref', p);
      };
    })();
  </script>

  <link rel="stylesheet" href="../tokens.css">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="case-study.css">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="../Chrome.jsx"></script>
  <script type="text/babel" src="case-study.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      const [themePref, setThemePref] = React.useState(() => {
        const v = localStorage.getItem('lp-theme');
        return v === 'dark' ? 'dark' : 'light';
      });
      const onThemeChange = (pref) => {
        setThemePref(pref);
        localStorage.setItem('lp-theme', pref);
        window.__applyTheme(pref);
      };

      // Reveal-on-scroll
      React.useEffect(() => {
        const els = document.querySelectorAll('.lp-reveal');
        const io = new IntersectionObserver((entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) { e.target.classList.add('is-in'); io.unobserve(e.target); }
          });
        }, { threshold: 0.08, rootMargin: '0px 0px -60px 0px' });
        els.forEach((el) => io.observe(el));
        return () => io.disconnect();
      }, []);

      return (
        <>
          <Grain />
          <CaseNav theme={themePref} setTheme={onThemeChange} />
          <main>
            <CaseStudy />
          </main>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
